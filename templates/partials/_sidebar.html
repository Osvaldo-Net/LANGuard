{# ── _sidebar.html ── Desktop sidebar navigation #}
<aside id="sidebar"
  class="fixed top-0 left-0 h-full w-52 bg-white dark:bg-dark2 border-r border-slate-200/80 dark:border-slate-800/60 flex flex-col z-50 -translate-x-full sm:translate-x-0 transition-transform duration-300">

  <!-- Logo -->
  <div class="px-4 pt-5 pb-4 border-b border-slate-100 dark:border-slate-800/60">
    <p class="font-semibold text-slate-900 dark:text-white leading-none tracking-tight" style="font-size:15px">LANGuard</p>
    <p class="text-slate-400 leading-none mt-1" style="font-size:10px;letter-spacing:.05em">v3.1.3</p>
  </div>

  <!-- Nav -->
  <nav class="flex-1 px-2.5 py-3 space-y-0.5 overflow-y-auto custom-scrollbar">

    <button onclick="escanearAhora()" class="nav-item primary mb-2">
      <i data-lucide="radar" class="w-3.5 h-3.5 flex-shrink-0"></i>
      <span data-i18n="scan">Escanear</span>
    </button>

    <div class="divider my-2"></div>
    <span class="section-label" data-i18n="sectionTools">Herramientas</span>

    <button onclick="abrirPanelHistorial()" class="nav-item w-full">
      <i data-lucide="activity" class="w-3.5 h-3.5 flex-shrink-0"></i>
      <span data-i18n="history">Historial</span>
    </button>

    <button onclick="abrirPanelConfiables()" class="nav-item w-full">
      <i data-lucide="shield-check" class="w-3.5 h-3.5 flex-shrink-0"></i>
      <span data-i18n="trustedDevices">Dispositivos Confiables</span>
    </button>

    <button onclick="abrirConfig()" class="nav-item w-full">
      <i data-lucide="settings" class="w-3.5 h-3.5 flex-shrink-0"></i>
      <span data-i18n="settings">Configuración</span>
    </button>

    <div class="divider my-2"></div>
    <span class="section-label" data-i18n="sectionPrefs">Preferencias</span>

    <!-- Idioma -->
    <div class="relative">
      <button id="langBtn" class="nav-item w-full justify-between">
        <div class="flex items-center gap-2">
          <span id="langFlag" class="fi fi-es w-3.5 h-2.5 rounded-sm flex-shrink-0"></span>
          <span id="langLabel">Español</span>
        </div>
        <i data-lucide="chevron-down" class="w-3 h-3 text-slate-400 flex-shrink-0"></i>
      </button>
      <div id="langMenu" class="dropdown-menu hidden">
        <button onclick="setLang('es')" class="dropdown-item">
          <span class="fi fi-es w-3.5 h-2.5 rounded-sm"></span> Español
        </button>
        <button onclick="setLang('en')" class="dropdown-item">
          <span class="fi fi-us w-3.5 h-2.5 rounded-sm"></span> English
        </button>
      </div>
    </div>

    <button onclick="toggleDarkMode()" class="nav-item w-full">
      <i id="icono-luna" data-lucide="moon" class="w-3.5 h-3.5 flex-shrink-0"></i>
      <i id="icono-sol"  data-lucide="sun"  class="w-3.5 h-3.5 flex-shrink-0 hidden"></i>
      <span data-i18n="changeTheme">Cambiar tema</span>
    </button>

  </nav>

  <!-- Bottom: hora discreta + usuario + logout -->
  <div class="border-t border-slate-100 dark:border-slate-800/60">

    <!-- Hora discreta -->
    <div class="px-4 pt-3 pb-1 flex items-center justify-between">
      <p id="horaActual-time" class="font-mono text-slate-400 dark:text-slate-500 tabular-nums leading-none" style="font-size:11px"></p>
      <p id="horaActual-date" class="text-slate-300 dark:text-slate-600 tabular-nums leading-none" style="font-size:10px"></p>
    </div>

    <!-- Usuario + logout agrupados -->
    <div class="px-2.5 pb-3 pt-1 space-y-0.5">
      <button onclick="abrirPerfil()"
        class="w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg hover:bg-slate-50 dark:hover:bg-dark3/60 transition text-left group">
        <div class="w-6 h-6 rounded-full bg-slate-900 dark:bg-slate-100 flex items-center justify-center flex-shrink-0">
          <i data-lucide="user" class="w-3 h-3 text-white dark:text-slate-900"></i>
        </div>
        <div class="flex-1 min-w-0">
          <p id="sidebar-user-name" class="truncate text-slate-700 dark:text-slate-300 font-medium leading-none" style="font-size:11px">{{ usuario_actual }}</p>
          <p class="text-slate-400 dark:text-slate-500 leading-none mt-0.5" style="font-size:10px" data-i18n="profileTitle">Perfil</p>
        </div>
        <i data-lucide="chevron-right" class="w-3 h-3 text-slate-300 dark:text-slate-600 flex-shrink-0 opacity-0 group-hover:opacity-100 transition"></i>
      </button>

      <a href="/logout"
        class="nav-item text-slate-400 hover:!text-red-500 hover:!bg-red-50 dark:hover:!bg-red-900/10">
        <i data-lucide="log-out" class="w-3.5 h-3.5 flex-shrink-0"></i>
        <span data-i18n="logout">Cerrar sesión</span>
      </a>
    </div>

  </div>
</aside>
