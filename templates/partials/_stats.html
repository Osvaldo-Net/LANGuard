{# ── _stats.html ── Stat summary cards (total / trusted / untrusted) #}
<div class="stats-grid stagger-1 fade-in">

  <!-- Total -->
  <div class="card px-5 py-4" style="position:relative;overflow:hidden">
    <div class="flex items-center justify-between mb-4">
      <span class="text-slate-400 dark:text-slate-500 font-medium uppercase tracking-widest" style="font-size:11px" data-i18n="statTotal">Total</span>
      <i data-lucide="laptop" class="w-4 h-4 text-slate-300 dark:text-slate-600"></i>
    </div>
    <p id="stat-total" class="tabular-nums font-semibold text-slate-900 dark:text-white leading-none mb-1.5" style="font-size:36px">0</p>
    <p class="text-slate-400 dark:text-slate-500" style="font-size:12px">Dispositivos en red</p>
  </div>

  <!-- Trusted -->
  <div class="card px-5 py-4" style="position:relative;overflow:hidden;border-color:rgba(34,197,94,.25)">
    <div style="position:absolute;top:0;left:0;right:0;height:2px;background:rgba(34,197,94,.5)"></div>
    <div class="flex items-center justify-between mb-4">
      <span class="font-medium uppercase tracking-widest" style="font-size:11px;color:#16a34a" data-i18n="statTrusted">Confiables</span>
      <i data-lucide="shield-check" class="w-4 h-4" style="color:#16a34a"></i>
    </div>
    <p id="stat-trusted" class="tabular-nums font-semibold leading-none mb-1.5" style="font-size:36px;color:#16a34a">0</p>
    <p class="text-slate-400 dark:text-slate-500" style="font-size:12px">Verificados por ti</p>
  </div>

  <!-- Untrusted -->
  <div class="card px-5 py-4" style="position:relative;overflow:hidden;border-color:rgba(239,68,68,.25)">
    <div style="position:absolute;top:0;left:0;right:0;height:2px;background:rgba(239,68,68,.5)"></div>
    <div class="flex items-center justify-between mb-4">
      <span class="font-medium uppercase tracking-widest" style="font-size:11px;color:#dc2626" data-i18n="statUntrusted">Sin verificar</span>
      <i data-lucide="shield-alert" class="w-4 h-4" style="color:#dc2626"></i>
    </div>
    <p id="stat-untrusted" class="tabular-nums font-semibold leading-none mb-1.5" style="font-size:36px;color:#dc2626">0</p>
    <p class="text-slate-400 dark:text-slate-500" style="font-size:12px">Requieren revisión</p>
  </div>

</div>
