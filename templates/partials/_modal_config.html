{# ── _modal_config.html ── System configuration modal #}
<div id="modal-config" class="fixed inset-0 modal-overlay flex items-end sm:items-center justify-center z-[65] hidden">
  <div class="card p-5 w-full sm:max-w-md relative fade-in max-h-[90vh] overflow-y-auto custom-scrollbar rounded-b-none sm:rounded-xl">
    <button onclick="cerrarConfig()"
      class="absolute top-3 right-3 text-slate-400 hover:text-slate-600 transition p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-dark3">
      <i data-lucide="x" class="w-4 h-4"></i>
    </button>
    <h2 class="text-sm font-semibold mb-5 flex items-center gap-2 text-slate-900 dark:text-white">
      <i data-lucide="settings" class="w-4 h-4 text-slate-500"></i>
      <span data-i18n="cfgTitle">Configuración del sistema</span>
    </h2>

    <div class="space-y-3">

      <!-- Telegram -->
      <div class="p-4 rounded-xl border border-slate-200 dark:border-slate-700/50 bg-slate-50/60 dark:bg-dark3/30">
        <h3 class="text-xs font-semibold text-slate-700 dark:text-slate-300 mb-3 flex items-center gap-1.5">
          <i data-lucide="send" class="w-3.5 h-3.5"></i>
          <span data-i18n="cfgTelegram">Notificaciones Telegram</span>
        </h3>
        <div class="space-y-2.5">
          <div>
            <label class="text-xs text-slate-500 dark:text-slate-400 mb-1 block font-medium" data-i18n="cfgToken">Bot Token</label>
            <input id="cfg-token" type="password" placeholder="123456:ABC-DEF..." class="input-base font-mono" autocomplete="off" />
          </div>
          <div>
            <label class="text-xs text-slate-500 dark:text-slate-400 mb-1 block font-medium" data-i18n="cfgChatId">Chat ID</label>
            <input id="cfg-chat" type="text" placeholder="-100123456789" class="input-base font-mono" autocomplete="off" />
          </div>
          <button onclick="testTelegram()" class="btn-action btn-neutral text-xs">
            <i data-lucide="send" class="w-3 h-3"></i>
            <span data-i18n="cfgTestBtn">Probar conexión</span>
          </button>
        </div>
      </div>

      <!-- Monitoring interval -->
      <div class="p-4 rounded-xl border border-amber-100 dark:border-amber-900/30 bg-amber-50/60 dark:bg-amber-900/10">
        <h3 class="text-xs font-semibold text-amber-700 dark:text-amber-400 mb-3 flex items-center gap-1.5">
          <i data-lucide="timer" class="w-3.5 h-3.5"></i>
          <span data-i18n="cfgMonitoring">Monitoreo de red</span>
        </h3>
        <label class="text-xs text-slate-500 dark:text-slate-400 mb-2 block font-medium">
          <span data-i18n="cfgInterval">Intervalo de escaneo</span>
          <span class="text-slate-400 ml-1 font-normal" data-i18n="cfgIntervalMin">(mín. 30s)</span>
        </label>
        <div class="flex items-center gap-2 mb-2.5">
          <input id="cfg-intervalo" type="number" min="30" max="3600" value="120" class="input-base" style="width:80px" inputmode="numeric" />
          <span class="text-xs text-slate-500" data-i18n="cfgIntervalUnit">seg</span>
        </div>
        <div class="flex gap-1.5 flex-wrap">
          <button onclick="setIntervalo(30)"  class="px-2.5 py-1 text-xs rounded-lg border border-amber-200 dark:border-amber-900/40 text-amber-700 dark:text-amber-400 hover:bg-amber-100 dark:hover:bg-amber-900/20 transition">30s</button>
          <button onclick="setIntervalo(60)"  class="px-2.5 py-1 text-xs rounded-lg border border-amber-200 dark:border-amber-900/40 text-amber-700 dark:text-amber-400 hover:bg-amber-100 dark:hover:bg-amber-900/20 transition">1 min</button>
          <button onclick="setIntervalo(120)" class="px-2.5 py-1 text-xs rounded-lg border border-amber-200 dark:border-amber-900/40 text-amber-700 dark:text-amber-400 hover:bg-amber-100 dark:hover:bg-amber-900/20 transition">2 min</button>
          <button onclick="setIntervalo(300)" class="px-2.5 py-1 text-xs rounded-lg border border-amber-200 dark:border-amber-900/40 text-amber-700 dark:text-amber-400 hover:bg-amber-100 dark:hover:bg-amber-900/20 transition">5 min</button>
          <button onclick="setIntervalo(600)" class="px-2.5 py-1 text-xs rounded-lg border border-amber-200 dark:border-amber-900/40 text-amber-700 dark:text-amber-400 hover:bg-amber-100 dark:hover:bg-amber-900/20 transition">10 min</button>
        </div>
      </div>

      <!-- Session timeout -->
      <div class="p-4 rounded-xl border border-emerald-100 dark:border-emerald-900/30 bg-emerald-50/60 dark:bg-emerald-900/10">
        <h3 class="text-xs font-semibold text-emerald-700 dark:text-emerald-400 mb-3 flex items-center gap-1.5">
          <i data-lucide="shield" class="w-3.5 h-3.5"></i>
          <span data-i18n="cfgSession">Tiempo de sesión</span>
        </h3>
        <div class="flex items-center gap-2 mb-2.5">
          <input id="cfg-session" type="number" min="0.083" max="24" step="0.5" value="8" class="input-base" style="width:80px" inputmode="decimal" />
          <span class="text-xs text-slate-500" data-i18n="cfgSessionUnit">horas</span>
        </div>
        <div class="flex gap-1.5 flex-wrap mb-2.5">
          <button onclick="document.getElementById('cfg-session').value=0.5" class="px-2.5 py-1 text-xs rounded-lg border border-emerald-200 dark:border-emerald-900/40 text-emerald-700 dark:text-emerald-400 hover:bg-emerald-100 dark:hover:bg-emerald-900/20 transition">30 min</button>
          <button onclick="document.getElementById('cfg-session').value=1"   class="px-2.5 py-1 text-xs rounded-lg border border-emerald-200 dark:border-emerald-900/40 text-emerald-700 dark:text-emerald-400 hover:bg-emerald-100 dark:hover:bg-emerald-900/20 transition">1h</button>
          <button onclick="document.getElementById('cfg-session').value=4"   class="px-2.5 py-1 text-xs rounded-lg border border-emerald-200 dark:border-emerald-900/40 text-emerald-700 dark:text-emerald-400 hover:bg-emerald-100 dark:hover:bg-emerald-900/20 transition">4h</button>
          <button onclick="document.getElementById('cfg-session').value=8"   class="px-2.5 py-1 text-xs rounded-lg border border-emerald-200 dark:border-emerald-900/40 text-emerald-700 dark:text-emerald-400 hover:bg-emerald-100 dark:hover:bg-emerald-900/20 transition">8h</button>
        </div>
        <p class="text-slate-400" style="font-size:11px" data-i18n="cfgSessionDesc">
          La sesión se cierra automáticamente tras el tiempo configurado de inactividad.
        </p>
      </div>

    </div>

    <div class="mt-4 flex justify-end gap-2 pt-4 border-t border-slate-100 dark:border-slate-800/40">
      <button onclick="cerrarConfig()"
        class="px-4 py-2 text-xs font-medium border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-dark3 transition text-slate-600 dark:text-slate-400"
        data-i18n="cfgCancel">Cancelar</button>
      <button onclick="guardarConfig()"
        class="px-4 py-2 text-xs font-semibold text-white rounded-lg hover:opacity-90 transition"
        style="background:#0f172a" data-i18n="cfgSave">Guardar cambios</button>
    </div>
  </div>
</div>
